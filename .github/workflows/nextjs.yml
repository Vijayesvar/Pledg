name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Cache Next.js
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
            ~/.npm
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      
      - name: Install dependencies
        run: npm ci --prefer-offline
      
      - name: Run Lint
        run: npm run lint -- --no-cache
      
      - name: Build with Next.js
        env:
          SITE_URL: https://vijayesvar.github.io/Pledg
          NEXT_PUBLIC_SITE_URL: https://vijayesvar.github.io/Pledg
        run: |
          npm run build
          npm run export
      
      - name: Prepare for GitHub Pages
        run: |
          # Create necessary files for GitHub Pages
          touch out/.nojekyll
          echo "pledg.in" > out/CNAME
          
          # Ensure all assets have the correct base path
          find out -type f -name '*.html' -exec sed -i 's|/Pledg/_next/|_next/|g' {} \;
          find out -type f -name '*.css' -exec sed -i 's|/Pledg/_next/|_next/|g' {} \;
          find out -type f -name '*.js' -exec sed -i 's|/Pledg/_next/|_next/|g' {} \;
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./out
          retention-days: 1
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
